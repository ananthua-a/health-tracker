services:
  postgres:
     image: docker.io/library/postgres:17
     environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: healthtracker
  backend:
    build: .
    ports:
      - "8000:8000"   
    env_file:
      - .env.docker
    depends_on:
      - postgres  
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

     


